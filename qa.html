<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
@keyframes fl{from{width:0%;}to{width:100%;}}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;background:#14342f;}
body{font-family:'Manrope',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px 0 40px 0;gap:15px;}
.ht{color:#EAF9E1;font-size:24px;font-weight:800;margin-bottom:10px;text-align:center;letter-spacing:0.5px;}
.si{display:flex;gap:8px;margin-bottom:1.75rem;justify-content:center;}
.sd{width:8px;height:8px;border-radius:50%;background:rgba(234,249,225,0.2);transition:all 0.3s;}
.sd.ac{background:#EAF9E1;transform:scale(1.2);}
.sd.dn{background:#083028;border:2px solid #EAF9E1;}
.qu{font-size:16px;font-weight:700;color:#EAF9E1;line-height:1.5;margin-bottom:1.5rem;text-align:center;padding:0 10px;}
.qi{width:95%;max-width:500px;}
.iw{position:relative;margin-bottom:15px;width:100%;}
.ei{width:100%;background:#EAF9E1;border:none;border-radius:60px;padding:1rem 1rem 1rem 2.75rem;font-family:'Manrope',sans-serif;font-size:20px;font-weight:700;color:#083028;outline:none;height:80px;}
.es{position:absolute;left:1.5rem;top:50%;transform:translateY(-50%);color:#083028;font-size:20px;font-weight:700;pointer-events:none;}
.fi{width:100%;background:#EAF9E1;border:none;border-radius:60px;padding:0 1.5rem;font-family:'Manrope',sans-serif;font-size:18px;font-weight:700;color:#083028;outline:none;height:80px;margin-bottom:15px;}
.fi::placeholder{color:rgba(8,48,40,0.4);font-weight:500;}
.op{display:flex;flex-direction:column;gap:15px;margin-bottom:15px;width:100%;}
.o{display:flex;align-items:center;background:#EAF9E1;border:none;border-radius:60px;cursor:pointer;transition:all 0.2s;user-select:none;height:80px;position:relative;}
.o:active{transform:scale(0.98);}
.o.sl{background:#c8e6c0;}
.oc{position:absolute;left:6%;width:32px;height:32px;border-radius:50%;border:2px solid #083028;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.o.sl .oc{background:#083028;}
.ok{width:10px;height:10px;border-radius:50%;background:#EAF9E1;opacity:0;transition:opacity 0.2s;}
.o.sl .ok{opacity:1;}
.ot{font-size:20px;font-weight:700;color:#083028;width:100%;text-align:center;padding-left:10%;}
.bn{background:#EAF9E1;color:#083028;border:none;border-radius:60px;width:100%;height:80px;font-family:'Manrope',sans-serif;font-size:20px;font-weight:700;cursor:pointer;transition:transform 0.1s ease;margin-top:5px;display:flex;align-items:center;position:relative;}
.bn:active{transform:scale(0.98);}
.bn:disabled{opacity:0.3;cursor:not-allowed;}
.bn .ic{position:absolute;left:6%;display:flex;align-items:center;justify-content:center;}
.bn .tw{flex-grow:1;display:flex;justify-content:center;padding-left:10%;}
.cb{background:#EAF9E1;width:100%;height:80px;border:none;border-radius:60px;display:flex;align-items:center;text-decoration:none;position:relative;transition:transform 0.1s ease;margin-top:15px;}
.cb:active{transform:scale(0.98);}
.cb .ic{position:absolute;left:6%;display:flex;align-items:center;justify-content:center;}
.cb .tw{flex-grow:1;display:flex;justify-content:center;padding-left:10%;}
.cb .bt{color:#083028;font-family:'Manrope',sans-serif;font-size:20px;font-weight:700;white-space:nowrap;}
.mi{fill:#083028;}
.tl{font-size:13px;font-weight:600;color:rgba(234,249,225,0.6);margin-bottom:6px;padding-left:1.5rem;}
.dg{display:flex;align-items:flex-start;gap:12px;background:rgba(234,249,225,0.06);border-radius:20px;padding:1rem 1.25rem;margin-bottom:15px;cursor:pointer;}
.dg input[type=checkbox]{width:22px;height:22px;min-width:22px;accent-color:#EAF9E1;cursor:pointer;margin-top:2px;}
.dg span{font-size:13px;color:rgba(234,249,225,0.7);line-height:1.6;}
.dg a{color:#EAF9E1;text-decoration:underline;}
.er{color:#ff6b6b;font-size:12px;text-align:center;margin-bottom:10px;display:none;}
</style>
</head>
<body>
<div class="ht">Ihr Immobilien Partner</div>
<div class="qi" id="cd">
  <div class="si">
    <div class="sd ac" id="d1"></div>
    <div class="sd" id="d2"></div>
    <div class="sd" id="d3"></div>
  </div>
  <div id="ct"></div>
</div>
<script>
var BOT_TOKEN='8638189052:AAE6nJwMUlosl4sWCTdt5f5ObkMxmSa585s';
var CHAT_ID='593749298';

var cur=0;
var ld={income:'',fn:'',ln:'',phone:'',email:'',time:''};

function sc(n,v,d){var e=new Date();e.setTime(e.getTime()+(d*24*60*60*1000));document.cookie=n+'='+v+';expires='+e.toUTCString()+';path=/';}
function gc(n){var na=n+'=';var ca=document.cookie.split(';');for(var i=0;i<ca.length;i++){var c=ca[i].trim();if(c.indexOf(na)===0)return c.substring(na.length);}return '';}

function dots(){
  ['d1','d2','d3'].forEach(function(id,i){
    var d=document.getElementById(id);
    d.className='sd';
    if(i<cur)d.classList.add('dn');
    else if(i===cur)d.classList.add('ac');
  });
}

function nb(fn){
  return '<button class="bn" id="nb" onclick="'+fn+'" disabled><div class="ic"><svg viewBox="0 0 24 24" width="32" height="32" fill="#083028"><path d="M8 5v14l11-7z"/></svg></div><div class="tw">Weiter</div></button>';
}

function render(){
  dots();
  var c=document.getElementById('ct');
  if(cur===0){
    c.innerHTML='<div class="qu">Wie hoch ist dein monatliches Nettoeinkommen?</div><div class="iw"><span class="es">€</span><input class="ei" type="number" id="inc" placeholder="0" min="0"></div>'+nb('hi()');
    document.getElementById('inc').addEventListener('input',function(){document.getElementById('nb').disabled=!this.value;});
  } else if(cur===1){
    c.innerHTML='<div class="qu">Wie heißt du?</div><div class="tl">Vorname</div><input class="fi" type="text" id="fn" placeholder="Max"><div class="tl">Nachname</div><input class="fi" type="text" id="ln" placeholder="Mustermann">'+nb('hn()');
    function chk(){document.getElementById('nb').disabled=!(document.getElementById('fn').value&&document.getElementById('ln').value);}
    document.getElementById('fn').addEventListener('input',chk);
    document.getElementById('ln').addEventListener('input',chk);
  } else if(cur===2){
    c.innerHTML='<div class="qu">Wie können wir dich erreichen?</div><div class="tl">Telefon</div><input class="fi" type="tel" id="ph" placeholder="+49..."><div class="tl">E-Mail</div><input class="fi" type="email" id="em" placeholder="deine@email.de"><div class="tl">Wann bist du am besten erreichbar?</div><div class="op"><div class="o" id="o0" onclick="st(\'Vormittags\',0)"><div class="oc"><div class="ok"></div></div><span class="ot">Vormittags</span></div><div class="o" id="o1" onclick="st(\'Nachmittags\',1)"><div class="oc"><div class="ok"></div></div><span class="ot">Nachmittags</span></div><div class="o" id="o2" onclick="st(\'Abends\',2)"><div class="oc"><div class="ok"></div></div><span class="ot">Abends</span></div></div><div class="dg" onclick="tg()"><input type="checkbox" id="dsgvo"><span>Ich stimme der Verarbeitung meiner Daten gemäß der <a href="https://www.ihrimmobilienpartner.com/datenschutz" target="_blank" onclick="event.stopPropagation()">Datenschutzerklärung</a> zu. (Art. 6 Abs. 1 lit. a DSGVO)</span></div><div class="er" id="er">Bitte alle Felder ausfüllen und Datenschutz bestätigen.</div><button class="bn" id="nb" onclick="hs()" disabled><div class="ic"><svg viewBox="0 0 24 24" width="32" height="32" fill="#083028"><path d="M8 5v14l11-7z"/></svg></div><div class="tw">Absenden</div></button>';
    function chk3(){
      var ok=document.getElementById('ph').value&&document.getElementById('em').value&&ld.time&&document.getElementById('dsgvo').checked;
      document.getElementById('nb').disabled=!ok;
    }
    document.getElementById('ph').addEventListener('input',chk3);
    document.getElementById('em').addEventListener('input',chk3);
  }
}

function tg(){
  var cb=document.getElementById('dsgvo');
  cb.checked=!cb.checked;
  var ok=document.getElementById('ph').value&&document.getElementById('em').value&&ld.time&&cb.checked;
  document.getElementById('nb').disabled=!ok;
}

function st(val,i){
  ld.time=val;
  document.querySelectorAll('.o').forEach(function(o){o.classList.remove('sl');});
  document.getElementById('o'+i).classList.add('sl');
  var ok=document.getElementById('ph').value&&document.getElementById('em').value&&ld.time&&document.getElementById('dsgvo').checked;
  document.getElementById('nb').disabled=!ok;
}

function bl(){
  sc('iip_blocked','1',3650);
  localStorage.setItem('iip_blocked','1');
  document.getElementById('cd').innerHTML='<div style="text-align:center;padding-top:20px;display:flex;flex-direction:column;align-items:center;gap:15px;"><div style="font-size:64px;">🔒</div><div style="color:#EAF9E1;font-size:22px;font-weight:800;font-family:Manrope,sans-serif;">Zugang dauerhaft gesperrt</div><div style="color:rgba(234,249,225,0.6);font-size:14px;line-height:1.7;max-width:400px;padding:0 20px;font-family:Manrope,sans-serif;">Du erfüllst leider nicht die Voraussetzungen für unsere Beratung. Der Zugang wurde dauerhaft gesperrt.</div></div>';
}

function sendTG(){
  var txt='🏠 Neue Anfrage!\n\n'+'👤 Name: '+ld.fn+' '+ld.ln+'\n'+'💶 Einkommen: €'+ld.income+'\n'+'📞 Telefon: '+ld.phone+'\n'+'📧 E-Mail: '+ld.email+'\n'+'🕐 Erreichbar: '+ld.time;
  fetch('https://api.telegram.org/bot'+BOT_TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT_ID,text:txt})});
}

function done(){
  var wMsg=encodeURIComponent('Hallo! Ich interessiere mich für eine Immobilien-Beratung. Am besten erreichbar: '+ld.time);
  var eSubj=encodeURIComponent('Anfrage: Immobilien-Beratung');
  var eBody=encodeURIComponent('Hallo,\n\nich interessiere mich für eine persönliche Immobilien-Beratung.\n\nName: '+ld.fn+' '+ld.ln+'\nTelefon: '+ld.phone+'\nAm besten erreichbar: '+ld.time+'\n\nMit freundlichen Grüßen\n'+ld.fn+' '+ld.ln);
  document.getElementById('cd').innerHTML='<div style="text-align:center;padding-top:20px;display:flex;flex-direction:column;align-items:center;gap:15px;margin-bottom:20px;"><div style="font-size:64px;">✅</div><div style="color:#EAF9E1;font-size:22px;font-weight:800;font-family:Manrope,sans-serif;">Vielen Dank!</div><div style="color:rgba(234,249,225,0.6);font-size:14px;line-height:1.7;font-family:Manrope,sans-serif;">Wir melden uns so schnell wie möglich bei dir.</div></div><div style="display:flex;flex-direction:column;gap:15px;width:100%;"><a href="https://wa.me/4915174424188?text='+wMsg+'" class="cb" target="_blank"><div class="ic"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="32" height="32"></div><div class="tw"><span class="bt">WhatsApp</span></div></a><a href="mailto:ihr.immobilien.partner@gmail.com?subject='+eSubj+'&body='+eBody+'" class="cb"><div class="ic"><svg class="mi" viewBox="0 0 24 24" width="32" height="32"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2,.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div><div class="tw"><span class="bt">E-Mail</span></div></a></div>';
}

function hi(){
  var v=parseInt(document.getElementById('inc').value);
  if(v<1600){bl();return;}
  ld.income=v;cur++;render();
}

function hn(){
  ld.fn=document.getElementById('fn').value.trim();
  ld.ln=document.getElementById('ln').value.trim();
  if(!ld.fn||!ld.ln)return;
  cur++;render();
}

function hs(){
  ld.phone=document.getElementById('ph').value.trim();
  ld.email=document.getElementById('em').value.trim();
  if(!ld.phone||!ld.email||!ld.time||!document.getElementById('dsgvo').checked){
    document.getElementById('er').style.display='block';return;
  }
  sendTG();
  done();
}

if(gc('iip_blocked')==='1'||localStorage.getItem('iip_blocked')==='1'){bl();}else{render();}
</script>
</body>
</html>
